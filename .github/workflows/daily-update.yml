name: Daily Automated Commit

on:
  schedule:
    - cron: '17 2 * * *'   # Runs daily at 02:17 UTC (specific time, no wildcards)
  workflow_dispatch:       # Allows manual trigger

jobs:
  daily-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Git
        run: |
          git config --global user.name "DevSync Automation Bot"
          git config --global user.email "23f3000789@ds.study.iitm.ac.in"

      - name: Daily update by 23f3000789@ds.study.iitm.ac.in
        run: |
          echo "Last updated on $(date -u)" >> daily-log.txt
          git add daily-log.txt
          git commit -m "Automated daily update - $(date -u)" || echo "No changes to commit"
          git push
